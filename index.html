<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UPSC QCAB Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>UPSC QCAB Generator</h1>

<select id="yearFilter"></select>

<select id="paperFilter">
    <option>All</option>
    <option>GS1</option>
    <option>GS2</option>
    <option>GS3</option>
    <option>GS4</option>
    <option>Essay</option>
</select>

<select id="topicFilter"></select>

<button onclick="applyFilters()">
Filter
</button>
  
<textarea id="bulkInput" rows="12" placeholder="Q1. Explain Plate Tectonics. [15]"></textarea><br><br>
<button onclick="importQuestions()">Import Questions</button>

<h2>Questions</h2>
<div id="questionList"></div>

<button onclick="generatePDF()">Generate QCAB PDF</button>

<script src="app.js"></script>
</body>
</html>
